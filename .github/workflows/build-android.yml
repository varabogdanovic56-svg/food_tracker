name: Build Android Native Library

on:
  push:
    paths:
      - 'FoodLogic.Core/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Android SDK
        uses: android-actions/setup-android@v2

      - name: Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"

      - name: Set NDK path
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Build Native Library
        working-directory: FoodLogic.Core
        run: |
          dotnet restore
          dotnet publish -c Release -r android-arm64 --self-contained true -p:NativeLib=Shared

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodLogic.Core.so
          path: FoodLogic.Core/bin/Release/net9.0/android-arm64/publish/*.so
