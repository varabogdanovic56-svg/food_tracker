name: Build Android Native Library

on:
  push:
    branches: [main]
    paths:
      - 'FoodLogic.Core/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Android NDK
        uses: android-ndk-setup@v1
        with:
          ndk-version: 'r27b'

      - name: Build Native Library
        working-directory: FoodLogic.Core
        run: |
          dotnet restore
          dotnet publish -c Release -r android-arm64 --self-contained true -p:NativeLib=Shared

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodLogic.Core.so
          path: FoodLogic.Core/bin/Release/net9.0/android-arm64/publish/*.so
