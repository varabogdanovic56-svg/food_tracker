name: food_tracker
description: "Mobile app for tracking food habits (nutrition diary, macros, water, weight)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Charts
  fl_chart: ^0.70.2
  
  # Database (for Flutter caching if needed)
  sqflite: ^2.4.2
  path: ^1.9.1
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  ffi: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
